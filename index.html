<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPI性格診断 20分セルフチェック</title>
    <meta
      name="description"
      content="SPIの性格診断を想定した、約200問の性格傾向セルフチェック。ビジネス上の傾向、円グラフ、長所と弱点の面接想定質問と回答例を表示します。"
    />
    <link rel="stylesheet" href="./styles.css?v=20260514-2" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#exam" aria-label="SPI性格診断 20分セルフチェック ホーム">
        <span class="brand-mark" aria-hidden="true">S</span>
        <span>SPI性格診断 20分セルフチェック</span>
      </a>
      <nav class="top-nav" aria-label="主要ナビゲーション">
        <a href="#exam">試験問題</a>
        <a href="#result">リザルト</a>
        <a href="#review">解説</a>
      </nav>
    </header>

    <main id="app" class="app" aria-live="polite"></main>

    <template id="exam-template">
      <section class="exam-layout" aria-labelledby="exam-title">
        <div class="floating-timer" data-timer-state="safe">
          <span>残り時間</span>
          <strong data-time-left>20:00</strong>
          <small data-time-status></small>
        </div>
        <aside class="exam-status" aria-label="試験状況">
          <div class="status-visual" aria-hidden="true">
            <div class="ring">
              <span data-current-question>1</span>
              <small>問目</small>
            </div>
          </div>
          <div class="status-list">
            <p>
              <span>科目</span>
              <strong>性格</strong>
            </p>
            <p>
              <span>内容</span>
              <strong>性格診断</strong>
            </p>
            <p>
              <span>回答形式</span>
              <strong>5段階選択</strong>
            </p>
            <p>
              <span>制限時間</span>
              <strong>20分 / 約200問</strong>
            </p>
          </div>
          <button class="ghost-button" type="button" data-reset>最初から</button>
        </aside>

        <section class="question-panel">
          <div class="question-head">
            <div>
              <p class="eyebrow">SPI対策模試</p>
              <h1 id="exam-title">性格診断</h1>
              <p class="lead">ジャンル: 性格 / 内容: 性格診断 / 直感に近い選択肢を選んでください</p>
            </div>
            <p class="question-count">
              <span data-progress-text>1 / 200</span>
            </p>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span data-progress-bar></span>
          </div>
          <article class="question-body">
            <p class="tag" data-question-category></p>
            <h2 data-question-title></h2>
            <p class="question-text" data-question-text></p>
            <form class="choices" data-choice-form></form>
          </article>
          <div class="exam-actions">
            <button class="ghost-button" type="button" data-prev>戻る</button>
            <button class="primary-button" type="button" data-next>次へ進む</button>
          </div>
        </section>
      </section>
    </template>

    <template id="result-template">
      <section class="result-layout" aria-labelledby="result-title">
        <div class="result-hero">
          <p class="eyebrow">Result</p>
          <h1 id="result-title">性格診断リザルト</h1>
          <div class="personality-chart" aria-label="性格傾向の円グラフ" data-personality-chart>
            <span data-top-trait>診断中</span>
          </div>
          <p class="result-message" data-result-message></p>
        </div>
        <section class="result-detail" aria-label="性格診断結果">
          <div class="section-head">
            <h2>ビジネス上の性格傾向</h2>
            <button class="primary-button" type="button" data-review-all>詳細を見る</button>
          </div>
          <div class="result-list" data-result-list></div>
          <section class="interview-section" aria-label="面接想定質問">
            <h2>面接で聞かれやすい想定質問</h2>
            <div data-interview-list></div>
          </section>
          <div class="result-actions">
            <button class="ghost-button" type="button" data-retry>もう一度診断する</button>
          </div>
        </section>
      </section>
    </template>

    <template id="review-template">
      <section class="review-layout" aria-labelledby="review-title">
        <div class="section-head">
          <div>
            <p class="eyebrow">Review</p>
            <h1 id="review-title">回答傾向の詳細</h1>
          </div>
          <a class="primary-link" href="#result">リザルトへ</a>
        </div>
        <div class="review-list" data-review-list></div>
      </section>
    </template>

    <script src="./app.js?v=20260518-personality-1"></script>
  </body>
</html>
